<div class="container-sec">
  <div class="commerce-sidebar">
    <div class="sidebar-head">
      <div class="" style="width: 150px">
        <img src="assets/image/shopaverLogo-Login2.png" width="150" alt="" />
      </div>
    </div>

    <div class="sidebar-main-container">
      <div class="sidebar-item" [ngClass]="{ 'active': isActiveRoute('/landing-page-list') }">
        <span>Landing page list</span>
        <span class="arrow">›</span>
      </div>

      <div class="sidebar-item"  (click)="goTo('landing-page-data')">
        <span>Form Data</span>
        <span class="arrow">›</span>
      </div>
          <div class="sidebar-item"  (click)="goTo('deleted-page-list')">
        <span>Deleted Slugs</span>
        <span class="arrow">›</span>
      </div>
        <div class="logoutbtn">
       <button (click)="logout()">Logout</button>
     </div>
    </div>
  </div>
  <div class="main-container">
    <div class="head">
      <p>List of landing Page</p>
      <button routerLink="/create-landing-page">Create New</button>
    </div>

    <div class="content-wrapper">
      <div *ngIf="isLoading" class="loader-container">
        <div class="spinner"></div>
        <p>Loading pages...</p>
      </div>

      <div class="page-card" *ngFor="let card of pageCards" [class.is-hidden]="isLoading">
        <div class="card-actions">
          <i
            class="fa fa-edit edit-icon"
            title="Edit"
            style="height: 22px; width: 22px"
            (click)="card.slug && openForEdit(card.slug); $event.stopPropagation()"
          ></i>

          <i
            class="fa fa-trash delete-icon"
            title="Delete"
            style="height: 22px; width: 22px"
            (click)="openDeleteModal(card.slug); $event.stopPropagation()"
          ></i>
        </div>

        <h4 style="margin-top: 15px">{{ card.title }}</h4>
        <p>{{ card.slug }}</p>

        <div class="preview">
          <img [src]="card.preview_image" [alt]="card.title || 'Preview Image'" />
          <a
            class="open-btn"
            [href]="card.slug ? getPageUrl(card.slug) : null"
            target="_blank"
            rel="noopener noreferrer"
          >
            Open Page
          </a>
        </div>
      </div>

      <p *ngIf="!isLoading && pageCards.length === 0" class="empty-state">
        {{ errorMsg || 'No pages available' }}
      </p>
    </div>
  </div>
</div>


<!-- DELETE CONFIRM MODAL -->
<div class="modal-backdrop" *ngIf="showDeleteModal">
  <div class="modal">
    <p>Are you sure you want to delete this page {{ selectedSlug }} ?</p>

    <div class="modal-actions">
       <button class="no-btn" (click)="cancelDelete()">No</button>
      <button class="yes-btn" (click)="confirmDelete()">Yes</button>
     
    </div>
  </div>
</div>
